user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Combined log format extended with response time
    log_format combined_plus '$remote_addr - $remote_user [$time_local] '
                             '"$request" $status $body_bytes_sent '
                             '"$http_referer" "$http_user_agent" '
                             'rt=$request_time';

    access_log  /var/log/nginx/access.log  combined_plus;

    sendfile        on;
    keepalive_timeout  65;
    gzip  on;

    server {
        listen       80;
        server_name  localhost;

        root   /usr/share/nginx/html;
        index  index.html;

        # Angular SPA – fall back to index.html for client-side routing
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Proxy FHIR API calls to HAPI FHIR server
        # Inside Docker the host machine is reachable via host.docker.internal
        location /fhir/ {
            proxy_pass         http://host.docker.internal:8080/fhir/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        # Static asset caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|json)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }
}
