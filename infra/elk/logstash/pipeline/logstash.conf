##########################################################################
# Logstash Pipeline – fhir-logs
#
# Inputs:
#   5044 – Beats (Filebeat forwards container & Nginx logs)
#   5000 – HTTP  (Angular structured JSON logs via LoggerService)
#
# Filters:
#   – JSON  : Angular / structured container logs
#   – Grok  : Nginx combined_plus access log lines
#   – Mutate: enrich with service.name, environment, tags;
#             rename trace_id / user / action / service fields
#
# Output:
#   Elasticsearch index: fhir-logs-YYYY.MM.dd
##########################################################################

input {
  # Filebeat → Logstash
  beats {
    port => 5044
  }

  # Angular LoggerService HTTP POST
  http {
    port => 5000
    codec => json
    response_headers => {
      "Access-Control-Allow-Origin"  => "*"
      "Access-Control-Allow-Headers" => "Content-Type"
      "Access-Control-Allow-Methods" => "POST, OPTIONS"
      "Content-Type"                 => "application/json"
    }
  }
}

filter {
  ##########################################################################
  # Branch 1: Nginx access logs forwarded by Filebeat
  # Filebeat sets fileset.name = access when using the nginx module,
  # or we detect the log field pattern.
  ##########################################################################
  if [log][file][path] =~ "nginx" or [fields][log_type] == "nginx" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:remote_user} \[%{HTTPDATE:nginx_time}\] "%{WORD:method} %{URIPATHPARAM:path} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code:int} %{NUMBER:bytes_sent:int} "%{DATA:referrer}" "%{DATA:user_agent}" rt=%{NUMBER:response_time_s:float} trace=%{DATA:trace_id}'
      }
      overwrite => [ "message" ]
    }

    if "_grokparsefailure" not in [tags] {
      date {
        match => [ "nginx_time", "dd/MMM/yyyy:HH:mm:ss Z" ]
        target => "@timestamp"
      }
      mutate {
        add_field => {
          "[service][name]" => "nginx"
          "environment"     => "local"
        }
        add_tag => [ "nginx_access" ]
      }
      # Remove empty trace_id values produced when no X-Trace-Id header was sent
      if [trace_id] == "" {
        mutate { remove_field => ["trace_id"] }
      }
    }
  }

  ##########################################################################
  # Branch 2: Structured JSON logs (Angular app or any JSON container log)
  ##########################################################################
  else if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      target => "app_log"
    }

    if [app_log][level] {
      mutate {
        rename => {
          "[app_log][level]"     => "level"
          "[app_log][message]"   => "log_message"
          "[app_log][module]"    => "module"
          "[app_log][url]"       => "request_url"
          "[app_log][method]"    => "http_method"
          "[app_log][duration]"  => "response_time_ms"
          "[app_log][timestamp]" => "app_timestamp"
          "[app_log][trace_id]"  => "trace_id"
          "[app_log][user]"      => "user"
          "[app_log][action]"    => "action"
          "[app_log][service]"   => "[service][name]"
        }
        add_field => {
          "environment" => "local"
        }
        add_tag => [ "angular_log" ]
      }
      # Fallback service name when the log entry does not carry a service field
      if ![service][name] {
        mutate { add_field => { "[service][name]" => "fhir-ui" } }
      }
    }
  }

  ##########################################################################
  # Branch 3: HTTP input from Angular LoggerService
  # (already decoded as JSON by codec => json above)
  ##########################################################################
  else if [@metadata][input] == "http" {
    mutate {
      rename => {
        "message"   => "log_message"
        "url"       => "request_url"
        "method"    => "http_method"
        "duration"  => "response_time_ms"
        "timestamp" => "app_timestamp"
        "service"   => "[service][name]"
      }
      add_field => {
        "environment" => "local"
      }
      add_tag => [ "angular_http_log" ]
    }
    # Fallback service name when the Angular log entry does not carry a service field
    if ![service][name] {
      mutate { add_field => { "[service][name]" => "fhir-ui" } }
    }
  }

  ##########################################################################
  # Common: tag errors for easy filtering
  ##########################################################################
  if [level] == "ERROR" or [level] == "error" {
    mutate { add_tag => [ "error" ] }
  }
}

output {
  elasticsearch {
    hosts     => ["http://elasticsearch:9200"]
    index     => "fhir-logs-%{+YYYY.MM.dd}"
    # data_stream => false  # classic index mode (no ILM required)
  }

  # Uncomment for debugging:
  # stdout { codec => rubydebug }
}
